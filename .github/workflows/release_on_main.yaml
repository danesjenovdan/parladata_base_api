name: Release On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Test, bump patch, and tag
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run test suite
        run: python -m unittest

      - name: Bump patch version in pyproject.toml
        id: bump
        run: |
          python - << 'PY'
          import re
          from pathlib import Path

          pyproject = Path("pyproject.toml")
          content = pyproject.read_text(encoding="utf-8")
          match = re.search(r'version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content)
          if not match:
              raise SystemExit("Could not find semantic version in pyproject.toml")

          major, minor, patch = map(int, match.groups())
          old_version = f"{major}.{minor}.{patch}"
          new_version = f"{major}.{minor}.{patch + 1}"

          updated = re.sub(
              r'version\s*=\s*"\d+\.\d+\.\d+"',
              f'version = "{new_version}"',
              content,
              count=1,
          )
          pyproject.write_text(updated, encoding="utf-8")

          with open("$GITHUB_OUTPUT", "a", encoding="utf-8") as out:
              out.write(f"old_version={old_version}\n")
              out.write(f"new_version={new_version}\n")
          PY

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:main

      - name: Create and push release tag
        run: |
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"
